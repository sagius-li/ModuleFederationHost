<h3>{{ state.message }}</h3>
<app-title-bar #titleBar></app-title-bar>
<ng-container *ngIf="remoteApp; else errorTemplate">
  <ng-container *ngComponentOutlet="remoteApp"></ng-container>
</ng-container>
<ng-template #errorTemplate>
  <p *ngIf="loadError">Remote widget failed to load.</p>
</ng-template>
